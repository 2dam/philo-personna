<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>전략 페르소나 플래너</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #171717;
      --muted: #6b665f;
      --line: #ddd5ca;
      --paper: #f8f3eb;
      --panel: #fffaf2;
      --accent: #b33d25;
      --accent-2: #165c64;
      --accent-3: #76633f;
      --good: #217354;
      --shadow: 0 18px 50px rgba(36, 26, 14, .12);
      --radius: 8px;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(179, 61, 37, .10), transparent 32%),
        linear-gradient(315deg, rgba(22, 92, 100, .13), transparent 34%),
        var(--paper);
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 1px solid transparent;
      border-radius: 7px;
      min-height: 40px;
      padding: 0 14px;
      color: #fff;
      background: var(--ink);
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }

    button:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0, 0, 0, .13); }
    button:active { transform: translateY(0); }
    button.secondary { color: var(--ink); background: transparent; border-color: var(--line); }
    button.ghost { color: var(--accent-2); background: transparent; border-color: transparent; padding-inline: 8px; }
    button.danger { background: var(--accent); }
    button.good { background: var(--good); }

    .app {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--ink), var(--accent-2));
      border-radius: 8px;
      font-weight: 800;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(24px, 3vw, 38px); letter-spacing: 0; }
    .subtle { color: var(--muted); line-height: 1.55; }

    .grid {
      display: grid;
      grid-template-columns: 410px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 250, 242, .88);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-inner { padding: 18px; }
    .sticky { position: sticky; top: 18px; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title h2 { font-size: 18px; }

    label {
      display: block;
      margin: 14px 0 7px;
      color: #3b332c;
      font-weight: 700;
      font-size: 13px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fffdf9;
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
    }

    textarea { min-height: 96px; resize: vertical; line-height: 1.55; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(22, 92, 100, .13); }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }

    .battle-map {
      min-height: 280px;
      padding: 22px;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(23, 23, 23, .04) 1px, transparent 1px),
        linear-gradient(rgba(23, 23, 23, .04) 1px, transparent 1px),
        rgba(255, 250, 242, .82);
      background-size: 36px 36px;
    }

    .map-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .meter-wrap {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .meter {
      min-height: 86px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(255,255,255,.64);
    }

    .meter strong {
      display: block;
      margin-bottom: 9px;
      font-size: 13px;
    }

    .bar {
      height: 8px;
      background: #e9dfd2;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: var(--w, 40%);
      background: var(--accent);
      border-radius: inherit;
    }

    .meter:nth-child(2) .bar span { background: var(--accent-2); }
    .meter:nth-child(3) .bar span { background: var(--accent-3); }

    .timeline {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .event {
      display: grid;
      grid-template-columns: 68px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fffdf9;
    }

    .event time { font-weight: 800; color: var(--accent); }
    .event h3 { font-size: 15px; margin-bottom: 4px; }
    .event p { color: var(--muted); line-height: 1.45; font-size: 13px; }

    .persona-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .persona {
      position: relative;
      min-height: 218px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fffdf9;
    }

    .persona.selected { border-color: var(--accent-2); box-shadow: inset 0 0 0 2px rgba(22, 92, 100, .14); }
    .avatar {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #241d18;
      color: #fff;
      font-weight: 800;
    }

    .persona h3 { font-size: 17px; }
    .tagline { min-height: 43px; color: var(--muted); line-height: 1.45; font-size: 13px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
    .chip {
      border: 1px solid #e5d8c8;
      border-radius: 99px;
      padding: 5px 8px;
      background: #fbf4e9;
      color: #53473b;
      font-size: 12px;
      white-space: nowrap;
    }

    .playbook {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fffdf9;
      padding: 15px;
    }

    .card h3 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 16px;
      margin-bottom: 9px;
    }

    .card ul { margin: 10px 0 0; padding-left: 18px; color: #302923; line-height: 1.62; }
    .script {
      margin-top: 10px;
      padding: 12px;
      border-left: 4px solid var(--accent-2);
      background: #f3fbfa;
      line-height: 1.55;
    }

    .alarm-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .alarm {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fffdf9;
    }

    .alarm strong { color: var(--accent); }
    .empty {
      min-height: 180px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      border: 1px dashed #d7c8b8;
      border-radius: 7px;
      background: rgba(255,255,255,.45);
      padding: 22px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(360px, calc(100vw - 36px));
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #171717;
      color: #fff;
      box-shadow: 0 16px 44px rgba(0, 0, 0, .24);
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity .2s ease, transform .2s ease;
      z-index: 20;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast p { color: #f4ede4; line-height: 1.45; margin-top: 4px; }

    @media (max-width: 930px) {
      .grid { grid-template-columns: 1fr; }
      .sticky { position: static; }
      .persona-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .app { width: min(100% - 20px, 1220px); padding-top: 18px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .row, .meter-wrap { grid-template-columns: 1fr; }
      .event, .alarm { grid-template-columns: 1fr; }
      .map-header { flex-direction: column; }
      button { width: 100%; }
      .actions button { flex: 1 1 150px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">策</div>
        <div>
          <h1>전략 페르소나 플래너</h1>
          <p class="subtle">하루 일정을 입력하면 철학자와 문학 인물이 자기소개하고, 선택된 관점으로 행동지침과 알람을 만듭니다.</p>
        </div>
      </div>
      <button id="notifyButton" class="secondary" type="button">알림 허용</button>
    </header>

    <section class="grid">
      <aside class="panel sticky" aria-label="일정 입력">
        <div class="panel-inner">
          <div class="section-title">
            <h2>내일의 전장 입력</h2>
            <button id="sampleButton" class="ghost" type="button">예시</button>
          </div>

          <label for="eventTime">시간</label>
          <input id="eventTime" type="time" value="09:00">

          <label for="eventTitle">일정</label>
          <input id="eventTitle" type="text" placeholder="예: 연간 예산 협의">

          <div class="row">
            <div>
              <label for="eventPerson">상대</label>
              <input id="eventPerson" type="text" placeholder="예: 재무팀 김팀장">
            </div>
            <div>
              <label for="eventMode">난관 유형</label>
              <select id="eventMode">
                <option value="협상">협상</option>
                <option value="갈등">갈등</option>
                <option value="위기">위기</option>
                <option value="인재">인재</option>
                <option value="관계">관계</option>
                <option value="결단">결단</option>
              </select>
            </div>
          </div>

          <label for="eventSituation">상황</label>
          <textarea id="eventSituation" placeholder="예: 상대가 예산을 크게 깎으려 하고, 우리 팀은 신규 프로젝트 승인이 필요함"></textarea>

          <div class="actions">
            <button id="addButton" type="button">일정 추가</button>
            <button id="clearButton" class="secondary" type="button">초기화</button>
          </div>
        </div>
      </aside>

      <div>
        <section class="panel battle-map" aria-label="전략 지도">
          <div class="map-header">
            <div>
              <h2>오늘의 전략 지도</h2>
              <p class="subtle">입력된 일정의 긴장도, 관계 민감도, 결단 압력을 읽어 페르소나를 추천합니다.</p>
            </div>
            <button id="analyzeButton" type="button">철학자 호출</button>
          </div>

          <div class="meter-wrap" aria-label="상황 지표">
            <div class="meter">
              <strong>긴장도</strong>
              <div class="bar"><span id="tensionBar"></span></div>
              <p id="tensionText" class="subtle">일정 입력 대기</p>
            </div>
            <div class="meter">
              <strong>관계 민감도</strong>
              <div class="bar"><span id="relationBar"></span></div>
              <p id="relationText" class="subtle">일정 입력 대기</p>
            </div>
            <div class="meter">
              <strong>결단 압력</strong>
              <div class="bar"><span id="decisionBar"></span></div>
              <p id="decisionText" class="subtle">일정 입력 대기</p>
            </div>
          </div>

          <div id="timeline" class="timeline"></div>
        </section>

        <section class="panel" style="margin-top:18px;" aria-label="페르소나 추천">
          <div class="panel-inner">
            <div class="section-title">
              <h2>당신을 도울 페르소나</h2>
              <span id="selectedName" class="chip">선택 대기</span>
            </div>
            <div id="personaGrid" class="persona-grid"></div>
          </div>
        </section>

        <section class="panel" style="margin-top:18px;" aria-label="행동지침">
          <div class="panel-inner">
            <div class="section-title">
              <h2>행동지침과 알람</h2>
              <div class="actions" style="margin:0;">
                <button id="scheduleButton" class="good" type="button">알람 설정</button>
                <button id="exportButton" class="secondary" type="button">요약 복사</button>
              </div>
            </div>
            <div id="playbook" class="playbook">
              <div class="empty">일정을 추가하고 철학자를 호출하면, 선택한 페르소나가 시간대별 행동지침을 작성합니다.</div>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite">
    <strong id="toastTitle">알림</strong>
    <p id="toastText"></p>
  </div>

  <script>
    const personas = [
      {
        id: "machiavelli",
        name: "마키아벨리",
        short: "M",
        tags: ["현실주의", "협상", "권력관계"],
        intro: "감정은 약점입니다. 상대의 필요와 두려움을 먼저 읽고, 한 번에 모든 전쟁을 치르지 마십시오.",
        fit: ["협상", "위기", "결단", "인재"],
        principle: "호의는 점진적으로, 어려운 결정은 한 번에 끝낸다.",
        tone: "냉정하고 짧게, 상대의 선택지를 좁히는 방식"
      },
      {
        id: "confucius",
        name: "공자",
        short: "孔",
        tags: ["관계", "예의", "질서"],
        intro: "상대의 체면을 세우면 길이 열립니다. 관계를 무너뜨리지 않는 승리를 설계하십시오.",
        fit: ["관계", "갈등", "인재"],
        principle: "예를 잃지 않되, 기준은 흐리지 않는다.",
        tone: "정중하고 품위 있게, 공동의 명분을 세우는 방식"
      },
      {
        id: "kant",
        name: "칸트",
        short: "K",
        tags: ["원칙", "공정", "책임"],
        intro: "이번 결정이 모두에게 적용되어도 괜찮은 규칙인지 물으십시오. 원칙은 협상 카드가 아닙니다.",
        fit: ["결단", "갈등", "협상"],
        principle: "사람을 수단으로만 대하지 않는다.",
        tone: "차분하고 논리적으로, 기준과 절차를 분명히 하는 방식"
      },
      {
        id: "nietzsche",
        name: "니체",
        short: "N",
        tags: ["의지", "돌파", "주도권"],
        intro: "회피는 상황을 키웁니다. 당신의 의지를 선명하게 드러내고 주도권을 되찾으십시오.",
        fit: ["위기", "결단", "갈등"],
        principle: "나를 약하게 만드는 합의를 거절한다.",
        tone: "강하고 직접적으로, 결정권이 내게 있음을 보이는 방식"
      },
      {
        id: "sartre",
        name: "사르트르",
        short: "S",
        tags: ["자유", "책임", "거리두기"],
        intro: "타인의 시선은 압박이지만, 선택은 여전히 당신의 것입니다. 사실과 감정을 분리하십시오.",
        fit: ["관계", "갈등", "결단"],
        principle: "선택하지 않는 것도 하나의 선택이며, 그 책임도 내 것이다.",
        tone: "감정을 걷어내고, 사실과 선택지를 선명히 나누는 방식"
      },
      {
        id: "tolstoy",
        name: "톨스토이",
        short: "T",
        tags: ["성찰", "사과", "회복"],
        intro: "복잡한 전략보다 단순한 진실이 관계를 회복합니다. 먼저 인정할 부분을 찾으십시오.",
        fit: ["관계", "갈등", "인재"],
        principle: "작은 진심 하나가 큰 방어를 무너뜨린다.",
        tone: "부드럽고 솔직하게, 자존심보다 회복을 우선하는 방식"
      }
    ];

    const extendedPersonas = [
      {
        id: "socrates",
        name: "소크라테스",
        short: "So",
        tags: ["질문", "무지의 자각", "대화"],
        intro: "답을 주기 전에 질문을 정교하게 만듭니다. 상대가 스스로 모순을 보게 하십시오.",
        fit: ["관계", "갈등", "결단"],
        keywords: ["대화", "질문", "자녀", "학생", "오해", "설득", "가르침"],
        principle: "좋은 질문은 방어를 낮추고 진실을 드러낸다.",
        tone: "단정하지 않고 묻되, 핵심에서 물러서지 않는 방식",
        moves: ["상대가 먼저 정의하게 하십시오.", "왜 그렇게 느끼는지 한 번 더 물으십시오.", "결론보다 질문의 질을 기록하십시오."]
      },
      {
        id: "aristotle",
        name: "아리스토텔레스",
        short: "Ar",
        tags: ["중용", "습관", "덕"],
        intro: "극단을 피하고 반복 가능한 좋은 습관을 설계합니다. 한 번의 승리보다 품성을 보십시오.",
        fit: ["관계", "인재", "결단"],
        keywords: ["습관", "교육", "성장", "균형", "훈육", "팀문화"],
        principle: "좋은 결정은 좋은 습관에서 나온다.",
        tone: "균형 있게, 과잉과 결핍 사이의 실천점을 찾는 방식",
        moves: ["극단적 대응 두 가지를 먼저 배제하십시오.", "반복 가능한 작은 행동을 정하십시오.", "오늘의 행동이 어떤 습관을 만드는지 점검하십시오."]
      },
      {
        id: "plato",
        name: "플라톤",
        short: "Pl",
        tags: ["이상", "공동선", "교육"],
        intro: "눈앞의 갈등 너머에 있는 더 좋은 질서를 상상합니다. 모두에게 어떤 세계를 만들지 묻습니다.",

    const storedEvents = localStorage.getItem("strategy-events");
    const storedPersona = localStorage.getItem("strategy-persona");
    const parsedEvents = storedEvents ? JSON.parse(storedEvents) : [];

    const state = {
      events: initialEvents,
      selectedPersonaId: storedPersona || (parsedEvents.length ? "" : "rousseau"),
      timers: []

    const $ = (id) => document.getElementById(id);

    function save() {
      localStorage.setItem("strategy-events", JSON.stringify(state.events));
      localStorage.setItem("strategy-persona", state.selectedPersonaId);
    }

    function toast(title, text) {
      $("toastTitle").textContent = title;
      $("toastText").textContent = text;
      $("toast").classList.add("show");
      window.clearTimeout(toast.timer);
      toast.timer = window.setTimeout(() => $("toast").classList.remove("show"), 4200);
    }

    function scoreEvents() {
      const text = state.events.map(e => `${e.title} ${e.person} ${e.mode} ${e.situation}`).join(" ");
      const count = state.events.length || 1;
      const has = (words) => words.some(w => text.includes(w));
      const tension = Math.min(95, 22 + count * 12 + (has(["위기", "삭감", "사직", "손실", "경쟁", "압박"]) ? 28 : 0));
      const relation = Math.min(95, 20 + count * 10 + (has(["갈등", "상대", "팀", "임원", "고객", "사과"]) ? 30 : 0));
      const decision = Math.min(95, 24 + count * 11 + (has(["결정", "협상", "승인", "계약", "예산", "선택"]) ? 27 : 0));
      return { tension, relation, decision };
    }

    function labelScore(score) {
      if (score >= 75) return "높음";
      if (score >= 48) return "중간";
      return "낮음";
    }

    function renderMeters() {
      const s = scoreEvents();
      $("tensionBar").style.setProperty("--w", `${s.tension}%`);
      $("relationBar").style.setProperty("--w", `${s.relation}%`);
      $("decisionBar").style.setProperty("--w", `${s.decision}%`);
      $("tensionText").textContent = labelScore(s.tension);
      $("relationText").textContent = labelScore(s.relation);
      $("decisionText").textContent = labelScore(s.decision);
    }

    function renderTimeline() {
      const wrap = $("timeline");

        return;
      }
      wrap.innerHTML = state.events
        .slice()
        .sort((a, b) => a.time.localeCompare(b.time))
        .map((event) => `
          <article class="event">
            <time>${event.time}</time>
            <div>
              <h3>${escapeHtml(event.title)} <span class="chip">${escapeHtml(event.mode)}</span></h3>
              <p>상대: ${escapeHtml(event.person || "미정")}</p>
              <p>${escapeHtml(event.situation || "상황 설명 없음")}</p>
            </div>

          </article>

    function recommendedPersonas() {
      const modes = state.events.map(e => e.mode);
      const text = state.events.map(e => `${e.title} ${e.person} ${e.mode} ${e.situation}`).join(" ").toLowerCase();
      return allPersonas
        .map(p => {
          const modeScore = p.fit.reduce((sum, fit) => sum + (modes.includes(fit) ? 4 : 0), 0);
          const keywordScore = (p.keywords || []).reduce((sum, keyword) => {
            return sum + (text.includes(String(keyword).toLowerCase()) ? 3 : 0);
          }, 0);
          const tagScore = p.tags.reduce((sum, tag) => {
            return sum + (text.includes(String(tag).toLowerCase()) ? 1 : 0);
          }, 0);
          return {
            ...p,
            score: modeScore + keywordScore + tagScore + (p.id === state.selectedPersonaId ? 1 : 0)
          };
        })
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);
    }

    function renderPersonas(forceRecommend = false) {
      if (forceRecommend && state.events.length) {
        state.selectedPersonaId = recommendedPersonas()[0].id;
        save();
      }
      const list = state.events.length ? recommendedPersonas() : allPersonas.slice(0, 3);
      const selected = allPersonas.find(p => p.id === state.selectedPersonaId);
      $("selectedName").textContent = selected ? `${selected.name} 선택됨 · 전체 ${allPersonas.length}명 중` : `선택 대기 · 전체 ${allPersonas.length}명`;
      $("personaGrid").innerHTML = list.map((p) => `
        <article class="persona ${p.id === state.selectedPersonaId ? "selected" : ""}">
          <div class="avatar">${p.short}</div>
          <h3>${p.name}</h3>
          <p class="tagline">${p.intro}</p>
          <div class="chips">${p.tags.map(tag => `<span class="chip">${tag}</span>`).join("")}</div>
          <button type="button" data-persona="${p.id}">${p.id === state.selectedPersonaId ? "선택됨" : "선택"}</button>
        </article>
      `).join("");
      renderPlaybook();
    }

    function renderPlaybook() {
      const persona = allPersonas.find(p => p.id === state.selectedPersonaId);
      const wrap = $("playbook");
      if (!state.events.length || !persona) {
        wrap.innerHTML = `<div class="empty">일정을 추가하고 페르소나를 선택하면 실행 카드가 생성됩니다.</div>`;
        return;
      }
      const sorted = state.events.slice().sort((a, b) => a.time.localeCompare(b.time));
      const cards = sorted.map((event) => {
        const i = instructionFor(event, persona);
        const alarmTime = offsetTime(event.time, -10);
        return `
          <article class="card">
            <h3>${event.time} ${escapeHtml(event.title)} <span class="chip">${persona.name}</span></h3>
            <p class="subtle">상대: ${escapeHtml(event.person || "미정")} · 상황: ${escapeHtml(event.situation || "상황 설명 없음")}</p>
            <ul>
              <li>${alarmTime} 알람: ${i.before}</li>
              <li>진행 중: ${i.during}</li>
              <li>종료 후: ${i.after}</li>
            </ul>
            <div class="script">${i.script}<br><strong>최종 책임은 당신에게 있습니다.</strong></div>
          </article>
        `;
      }).join("");
      const alarms = sorted.map(event => `
        <div class="alarm">
          <strong>${offsetTime(event.time, -10)}</strong>
          <span>${escapeHtml(event.title)} 직전 행동지침</span>
          <span class="chip">${persona.name}</span>
        </div>
      `).join("");
      wrap.innerHTML = `
        <div class="card">
          <h3>${persona.name}의 오늘 원칙</h3>
          <p class="script">${persona.principle}</p>
          <p class="subtle" style="margin-top:10px;">말투: ${persona.tone}</p>
        </div>
        ${cards}
        <div class="card">
          <h3>알람 큐</h3>
          <div class="alarm-list">${alarms}</div>
        </div>
      `;
    }

    function offsetTime(time, minutes) {
      const [h, m] = time.split(":").map(Number);
      const date = new Date();
      date.setHours(h, m + minutes, 0, 0);
      return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function scheduleAlarms() {
      const persona = allPersonas.find(p => p.id === state.selectedPersonaId);
      if (!persona || !state.events.length) {
        toast("알람 설정 실패", "먼저 일정과 페르소나를 선택해 주세요.");
        return;
      }
      state.timers.forEach(window.clearTimeout);
      state.timers = [];
      const now = new Date();
      state.events.forEach(event => {
        const [h, m] = offsetTime(event.time, -10).split(":").map(Number);
        const alarmDate = new Date();
        alarmDate.setHours(h, m, 0, 0);
        if (alarmDate <= now) alarmDate.setDate(alarmDate.getDate() + 1);
        const delay = alarmDate - now;
        const i = instructionFor(event, persona);
        const timer = window.setTimeout(() => {
          const title = `[${persona.name}] ${event.title}`;
          const body = i.before;
          if ("Notification" in window && Notification.permission === "granted") {
            new Notification(title, { body });
          }
          toast(title, body);
        }, delay);
        state.timers.push(timer);
      });
      toast("알람 설정 완료", "브라우저가 열려 있는 동안 일정 10분 전에 행동지침을 알려드립니다.");
    }

    async function copySummary() {
      const persona = allPersonas.find(p => p.id === state.selectedPersonaId);
      if (!persona || !state.events.length) {
        toast("복사 실패", "요약할 전략이 아직 없습니다.");
        return;
      }
      const lines = [`전략 페르소나: ${persona.name}`, `오늘 원칙: ${persona.principle}`, ""];
      state.events.slice().sort((a, b) => a.time.localeCompare(b.time)).forEach(event => {
        const i = instructionFor(event, persona);
        lines.push(`${event.time} ${event.title}`);
        lines.push(`상대: ${event.person || "미정"}`);
        lines.push(`상황: ${event.situation || "상황 설명 없음"}`);
        lines.push(`행동: ${i.before} / ${i.during} / ${i.after}`);
        lines.push(`대사: ${i.script}`);
        lines.push("");
      });
      try {
        await navigator.clipboard.writeText(lines.join("\n"));
        toast("요약 복사 완료", "전략 요약을 클립보드에 담았습니다.");
      } catch {
        toast("복사 제한", "브라우저 권한 때문에 자동 복사가 막혔습니다. 화면의 내용을 직접 선택해 복사해 주세요.");
      }
    }

    function addEvent() {
      const title = $("eventTitle").value.trim();
      if (!title) {
        toast("일정 필요", "일정 이름을 입력해 주세요.");
        $("eventTitle").focus();
        return;
      }
      state.events.push({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        time: $("eventTime").value || "09:00",
        title,
        person: $("eventPerson").value.trim(),
        mode: $("eventMode").value,
        situation: $("eventSituation").value.trim()
      });
      $("eventTitle").value = "";
      $("eventPerson").value = "";
      $("eventSituation").value = "";
      save();
      renderAll();
      toast("일정 추가", "전략 지도에 새 일정이 반영되었습니다.");
    }

    function loadSample() {
      state.events = [
        { id: "s1", time: "09:00", title: "연간 예산 협의", person: "재무팀 김팀장", mode: "협상", situation: "상대가 예산을 20% 깎으려 하고 신규 프로젝트 승인이 걸려 있음" },
        { id: "s2", time: "14:00", title: "핵심 개발자 면담", person: "개발자 A", mode: "인재", situation: "경쟁사 스카우트 제안을 받고 사직서를 고민 중" },
        { id: "s3", time: "18:00", title: "고객사 석식", person: "주요 고객사 대표", mode: "관계", situation: "계약 연장 조건이 까다롭고 신뢰 회복이 필요함" }
      ];
      state.selectedPersonaId = "machiavelli";
      save();
      renderAll();
      toast("예시 입력", "마키아벨리 모드 예시를 불러왔습니다.");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[m]);
    }

    function renderAll() {
      renderMeters();
      renderTimeline();
      renderPersonas(false);
    }

    $("addButton").addEventListener("click", addEvent);
    $("sampleButton").addEventListener("click", loadSample);
    $("clearButton").addEventListener("click", () => {
      state.events = [];
      state.selectedPersonaId = "";
      save();
      renderAll();
      toast("초기화", "입력된 일정과 선택을 비웠습니다.");
    });
    $("analyzeButton").addEventListener("click", () => {
      if (!state.events.length) {
        toast("일정 필요", "먼저 내일의 전장을 하나 이상 입력해 주세요.");
        return;
      }
      renderPersonas(true);
      toast("철학자 호출", "현재 일정에 맞는 페르소나 3명을 추천했습니다.");
    });
    $("personaGrid").addEventListener("click", (event) => {
      const button = event.target.closest("[data-persona]");
      if (!button) return;
      state.selectedPersonaId = button.dataset.persona;
      save();
      renderPersonas(false);
    });
    $("timeline").addEventListener("click", (event) => {
      const button = event.target.closest("[data-remove]");
      if (!button) return;
      state.events = state.events.filter(item => item.id !== button.dataset.remove);
      save();
      renderAll();
    });
    $("scheduleButton").addEventListener("click", scheduleAlarms);
    $("exportButton").addEventListener("click", copySummary);
    $("notifyButton").addEventListener("click", async () => {
      if (!("Notification" in window)) {
        toast("알림 미지원", "이 브라우저에서는 데스크톱 알림을 지원하지 않습니다.");
        return;
      }
      const result = await Notification.requestPermission();
      toast("알림 권한", result === "granted" ? "알림을 보낼 수 있습니다." : "권한이 허용되지 않았습니다.");
    });

    renderAll();
  </script>
</body>
</html>
